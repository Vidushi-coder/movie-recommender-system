<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Movie Recommendation System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css')}}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <!-- For creating a heading -->
    <nav class="navbar bg-primary p-2 text-white bg-opacity-75">
        <div class="container-fluid justify-content-center">
            <span class="mb-0 h1">Movie Recommendation System</span>
        </div>
    </nav>

    <h4 class="mt-5 text-center">Enter a Movie Name:</h4>

    <!-- Enter Movie Name -->
    <div class="container mt-4">
        <div class="d-flex justify-content-center">
        <form method="POST" action="/add" class="d-flex">
            <input type="text" name="movie" placeholder="Enter the Movie Name" class="MovieName me-2">
            <button type="submit" class="AddMovie">Search</button>
        </form>
    </div>
    </div>

    {% if MovieName %}
    <h4 class="mt-5 text-center">Recommended Movies for: {{MovieName}}</h4>
    <div class="movieBox">
        {% if Recommendations %}
            {% for movie in Recommendations %}
                <div class="movie">
                    {{movie}}
                </div>
            {% endfor %}
        {% else %}
            <p class="text-center">Sorry, cannot recommend moivies related to this one!</p>
        {% endif %}
    </div>
    {% endif %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
